<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reform Document Uploader</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Reform Operations</p>
        <h1>Document Intake</h1>
      </div>
      <label class="upload-button">
        <input id="file-input" type="file" accept="application/pdf" />
        Upload PDF
      </label>
    </header>

    <main class="workspace">
      <aside class="sidebar">
        <div class="panel-title">
          <h2>Uploaded files</h2>
          <span id="upload-status"></span>
        </div>
        <div id="document-list" class="document-list"></div>
      </aside>

      <section class="viewer">
        <div class="viewer-toolbar">
          <div>
            <h2 id="active-title">No document selected</h2>
            <p id="active-subtitle">Upload a PDF to extract shipment data.</p>
          </div>
          <a id="pdf-link" class="ghost-link" href="#" target="_blank" hidden>Open PDF</a>
        </div>
        <div id="pages" class="pages empty-state">
          <p>PDF pages and extraction highlights will appear here.</p>
        </div>
      </section>

      <aside class="details">
        <div class="panel-title">
          <h2>Extracted data</h2>
          <span id="confidence-summary" class="confidence neutral">--</span>
        </div>
        <div id="fields" class="fields"></div>
        <div class="line-items-header">
          <h2>Line items</h2>
        </div>
        <div id="line-items" class="line-items"></div>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
